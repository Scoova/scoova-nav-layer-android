name: Release — Publish to Maven Central

# Triggered by pushing a versioned tag `v*` (e.g. `git tag v1.0.2 && git push --tags`).
# Publishes all 5 nav-layer modules (core, ui, adapter-scoova-routing,
# adapter-maplibre, adapter-google-maps) to Maven Central under
# `info.scoo-va:scoova-nav-layer-<module>`, plus GitHub Packages.
#
# Required org-level secrets (already set on the Scoova org):
#   OSSRH_USERNAME   — Sonatype Central Portal username
#   OSSRH_PASSWORD   — Sonatype Central Portal token
#   SIGNING_KEY      — ASCII-armored PGP secret key
# Optional:
#   SIGNING_PASSWORD — passphrase for the PGP key

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    name: Publish info.scoo-va:scoova-nav-layer-* to Maven Central
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for gh release create
      packages: write   # for GitHub Packages publish
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17
          cache: gradle

      - name: Stage release artifacts (signed) — all 5 modules
        env:
          SIGNING_KEY:       ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD:  ${{ secrets.SIGNING_PASSWORD }}
        run: |
          ./gradlew \
            :core:publishReleasePublicationToLocalStagingRepository \
            :ui:publishReleasePublicationToLocalStagingRepository \
            :adapter-scoova-routing:publishReleasePublicationToLocalStagingRepository \
            :adapter-maplibre:publishReleasePublicationToLocalStagingRepository \
            :adapter-google-maps:publishReleasePublicationToLocalStagingRepository \
            --no-daemon --stacktrace

      - name: Upload bundle to Sonatype Central Portal
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        run: ./scripts/publish-to-central-portal.sh

      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew \
            :core:publishReleasePublicationToGitHubPackagesRepository \
            :ui:publishReleasePublicationToGitHubPackagesRepository \
            :adapter-scoova-routing:publishReleasePublicationToGitHubPackagesRepository \
            :adapter-maplibre:publishReleasePublicationToGitHubPackagesRepository \
            :adapter-google-maps:publishReleasePublicationToGitHubPackagesRepository \
            --no-daemon

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "Published \`info.scoo-va:scoova-nav-layer-{core,ui,adapter-scoova-routing,adapter-maplibre,adapter-google-maps}:${{ github.ref_name }}\` to Maven Central via Sonatype Central Portal." \
            --verify-tag
